.doc-section ul{list-style:none;margin:0.5rem 0 0.75rem}
.doc-section ul li{font-size:0.9rem;line-height:1.8;color:var(--text-muted);padding-left:1.2rem;position:relative}
.doc-section ul li::before{content:'—';position:absolute;left:0;color:var(--accent);opacity:0.5}
.doc-section a{color:var(--accent);text-underline-offset:3px}

.third-party-box{background:white;border:1px solid rgba(65,0,34,0.1);border-radius:14px;padding:20px 24px;margin:1rem 0}

function renderContent(lang) {
  const d = content[lang];
  document.getElementById('eyebrow').textContent = d.eyebrow;
  document.getElementById('title').innerHTML = d.title;
  document.getElementById('date').textContent = d.date;
  document.getElementById('nav-back-txt').textContent = d.back;
  document.documentElement.lang = lang;

  let html = '';
  d.sections.forEach(s => {
    html += `<div class="doc-section"><h2>${s.h}</h2>`;
    if (s.p) html += `<p>${s.p.replace(/\n/g,'<br>')}</p>`;
    if (s.ul) {
      html += '<ul>';
      s.ul.forEach(item => html += `<li>${item}</li>`);
      html += '</ul>';
    }
    if (s.p2) html += `<p>${s.p2}</p>`;
    if (s.thirdParty) {
      const tp = s.thirdParty;
      html += `<div class="third-party-box">
        <div class="name">${tp.name}</div>
        <div class="desc">${tp.desc} <a href="${tp.link}" target="_blank" rel="noopener">${tp.linkTxt} ↗</a></div>
      </div>`;
    }
    html += '</div>';
  });
  document.getElementById('doc-content').innerHTML = html;
}

function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
  renderContent(lang);
}
